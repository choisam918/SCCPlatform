<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin - Bingo 範圍設定</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0b1220;
        --card: rgba(255, 255, 255, 0.06);
        --card2: rgba(255, 255, 255, 0.10);
        --text: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.70);
        --border: rgba(255, 255, 255, 0.12);
        --accent: #7c3aed;
        --danger: #ef4444;
      }
      @media (prefers-color-scheme: light) {
        :root {
          --bg: #f6f7fb;
          --card: rgba(0, 0, 0, 0.04);
          --card2: rgba(0, 0, 0, 0.07);
          --text: rgba(0, 0, 0, 0.88);
          --muted: rgba(0, 0, 0, 0.60);
          --border: rgba(0, 0, 0, 0.12);
        }
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans TC", "PingFang TC",
          "Microsoft JhengHei", Arial, sans-serif;
        background: radial-gradient(1000px 600px at 15% 10%, rgba(124, 58, 237, 0.22), transparent 55%),
          var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 20px;
      }
      .wrap {
        width: min(760px, 100%);
        display: grid;
        gap: 14px;
      }
      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
      }
      h1 {
        margin: 0;
        font-size: 18px;
        letter-spacing: 0.2px;
      }
      .sub { color: var(--muted); font-size: 13px; margin-top: 4px; }
      .card {
        border: 1px solid var(--border);
        background: linear-gradient(180deg, var(--card), transparent 120%);
        border-radius: 18px;
        padding: 16px;
      }
      .row { display: grid; grid-template-columns: 1fr; gap: 10px; }
      label { font-weight: 700; font-size: 13px; color: var(--muted); }
      input {
        width: 100%;
        padding: 12px 12px;
        border-radius: 14px;
        border: 1px solid var(--border);
        background: rgba(255,255,255,0.03);
        color: var(--text);
        font-size: 14px;
        outline: none;
      }
      input:focus { border-color: rgba(124, 58, 237, 0.45); }
      .actions { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
      a.btn, button.btn {
        appearance: none;
        border: 1px solid var(--border);
        background: var(--card);
        color: var(--text);
        padding: 10px 12px;
        border-radius: 12px;
        cursor: pointer;
        text-decoration: none;
        font-weight: 700;
        font-size: 14px;
        transition: transform 140ms ease, background 140ms ease, border-color 140ms ease;
        -webkit-user-select: none;
        user-select: none;
      }
      a.btn:hover, button.btn:hover {
        background: var(--card2);
        transform: translateY(-1px);
        border-color: rgba(124, 58, 237, 0.35);
      }
      button.primary {
        border: 1px solid rgba(124, 58, 237, 0.35);
        background: linear-gradient(180deg, rgba(124, 58, 237, 0.9), rgba(124, 58, 237, 0.75));
      }
      button.danger {
        border: 1px solid rgba(239, 68, 68, 0.35);
        background: linear-gradient(180deg, rgba(239, 68, 68, 0.9), rgba(239, 68, 68, 0.75));
      }
      .msg {
        margin-top: 10px;
        font-size: 13px;
        color: var(--muted);
        min-height: 18px;
      }
      .msg.ok { color: rgba(34, 197, 94, 0.95); }
      .msg.err { color: rgba(239, 68, 68, 0.95); }
      .hidden { display: none !important; }
      .hint {
        color: var(--muted);
        font-size: 12px;
        margin-top: 10px;
        line-height: 1.6;
      }
      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        font-size: 0.95em;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <div>
          <h1>Admin - Bingo 範圍設定</h1>
          <div class="sub">僅設定數字最大範圍。遊戲與號碼板請在首頁操作。</div>
        </div>
        <div class="actions">
          <a class="btn" href="index.html">回主頁</a>
        </div>
      </header>

      <section class="card" id="gate">
        <div class="row">
          <div>
            <label for="password">密碼</label>
            <input id="password" type="password" inputmode="text" autocomplete="off" placeholder="輸入管理密碼" />
          </div>
          <div class="actions">
            <button class="btn primary" id="btnLogin" type="button">登入</button>
          </div>
          <div class="msg" id="gateMsg"></div>
        </div>
        <div class="hint">密碼固定為 <code>admin@123</code>。</div>
      </section>

      <section class="card hidden" id="panel">
        <div class="row">
          <div>
            <label for="maxRange">數字最大範圍（從 1 開始）</label>
            <input id="maxRange" type="number" min="1" max="9999" step="1" placeholder="例如：75" />
          </div>
          <div class="actions">
            <button class="btn primary" id="btnSave" type="button">儲存</button>
            <button class="btn danger" id="btnClearRound" type="button" title="清空主頁已抽紀錄">清空本回合紀錄</button>
          </div>
          <div class="msg" id="panelMsg"></div>
        </div>
        <div class="hint">
          儲存後回到首頁即可；首頁會顯示 1～最大值的號碼板，抽到即變色。<br />
          若要重抽，可用「清空本回合紀錄」或首頁「新回合」。
        </div>
      </section>
    </div>

    <script>
      const ADMIN_PASSWORD = "admin@123";
      const STORAGE_KEYS = {
        max: "bingo:max",
        drawn: "bingo:drawn",
        history: "bingo:history",
        events: "bingo:events"
      };

      function clampInt(n, min, max) {
        const x = Number.parseInt(String(n), 10);
        if (!Number.isFinite(x)) return min;
        return Math.min(max, Math.max(min, x));
      }

      function getMax() {
        const raw = localStorage.getItem(STORAGE_KEYS.max);
        return clampInt(raw ?? 75, 1, 9999);
      }

      function setMsg(el, text, kind) {
        el.textContent = text || "";
        el.classList.remove("ok", "err");
        if (kind) el.classList.add(kind);
      }

      function showPanel() {
        document.getElementById("gate").classList.add("hidden");
        document.getElementById("panel").classList.remove("hidden");
        document.getElementById("maxRange").value = String(getMax());
        document.getElementById("maxRange").focus();
      }

      function login() {
        const pw = document.getElementById("password").value;
        const msg = document.getElementById("gateMsg");
        if (pw === ADMIN_PASSWORD) {
          sessionStorage.setItem("bingo:adminAuthed", "1");
          setMsg(msg, "", null);
          showPanel();
          return;
        }
        setMsg(msg, "密碼錯誤，請再試一次。", "err");
      }

      function save() {
        const input = document.getElementById("maxRange").value;
        const max = clampInt(input, 1, 9999);
        localStorage.setItem(STORAGE_KEYS.max, String(max));
        setMsg(document.getElementById("panelMsg"), `已儲存：最大範圍為 1 ~ ${max}。`, "ok");
      }

      function clearRound() {
        localStorage.removeItem(STORAGE_KEYS.drawn);
        localStorage.removeItem(STORAGE_KEYS.history);
        localStorage.removeItem(STORAGE_KEYS.events);
        setMsg(document.getElementById("panelMsg"), "已清空本回合紀錄。", "ok");
      }

      document.getElementById("btnLogin").addEventListener("click", login);
      document.getElementById("password").addEventListener("keydown", (e) => {
        if (e.key === "Enter") login();
      });
      document.getElementById("btnSave").addEventListener("click", save);
      document.getElementById("btnClearRound").addEventListener("click", clearRound);
      document.getElementById("maxRange").addEventListener("keydown", (e) => {
        if (e.key === "Enter") save();
      });

      if (sessionStorage.getItem("bingo:adminAuthed") === "1") {
        showPanel();
      } else {
        document.getElementById("password").focus();
      }
    </script>
  </body>
</html>
